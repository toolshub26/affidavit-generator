<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Legal Affidavit Generator</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-container">

<div class="form-section">
<h2>Global Legal Affidavit Generator</h2>

<label>Language</label>
<select id="lang">
<option value="en">English</option>
<option value="ar">Arabic</option>
</select>

<label>Country (Governing Law)</label>
<input list="countries" id="country" placeholder="Type to search country...">

<datalist id="countries">
<option value="Afghanistan">
<option value="Albania">
<option value="Algeria">
<option value="Argentina">
<option value="Australia">
<option value="Austria">
<option value="Bahrain">
<option value="Bangladesh">
<option value="Belgium">
<option value="Brazil">
<option value="Canada">
<option value="China">
<option value="Denmark">
<option value="Egypt">
<option value="Finland">
<option value="France">
<option value="Germany">
<option value="Greece">
<option value="India">
<option value="Indonesia">
<option value="Iran">
<option value="Iraq">
<option value="Ireland">
<option value="Italy">
<option value="Japan">
<option value="Jordan">
<option value="Kuwait">
<option value="Malaysia">
<option value="Mexico">
<option value="Morocco">
<option value="Netherlands">
<option value="New Zealand">
<option value="Norway">
<option value="Oman">
<option value="Pakistan">
<option value="Philippines">
<option value="Poland">
<option value="Qatar">
<option value="Russia">
<option value="Saudi Arabia">
<option value="Singapore">
<option value="South Africa">
<option value="South Korea">
<option value="Spain">
<option value="Sweden">
<option value="Switzerland">
<option value="Turkey">
<option value="UAE">
<option value="UK">
<option value="USA">
</datalist>

<label>Full Name</label>
<input type="text" id="name">

<label>Father Name</label>
<input type="text" id="father">

<label>Address</label>
<input type="text" id="address">

<label>Purpose</label>
<textarea id="purpose"></textarea>

<div class="btn-row">
<button onclick="generateAffidavit()">Update Preview</button>
<button onclick="window.print()">Print A4</button>
</div>

</div>

<div id="preview" class="preview-section"></div>

</div>

<script src="script.js"></script>

</body>
</html>
