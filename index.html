<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Legal Affidavit Generator</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#f2f2f2;
  font-family: Arial, sans-serif;
}

.container{
  max-width:900px;
  margin:auto;
  background:#ffffff;
  padding:20px;
  border-radius:8px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
}

select,input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:8px;
}

button:hover{
  background:#084298;
}

.preview{
  margin-top:30px;
  background:#fff;
  padding:25mm;
  border:1px solid #000;
  font-family:"Times New Roman", serif;
  min-height:260mm;
}

.legal-header{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  letter-spacing:2px;
}

.sub-head{
  font-size:14px;
  margin-top:5px;
}

.legal-body{
  margin-top:25px;
  font-size:16px;
  line-height:1.8;
}

.legal-clauses{
  margin-top:15px;
}

.law-line{
  margin-top:25px;
  font-weight:bold;
}

.date-place{
  margin-top:40px;
}

.signature-section{
  display:flex;
  justify-content:space-between;
  margin-top:60px;
}

.sign-box{
  width:45%;
  text-align:center;
}

/* PRINT */
@media print{
  body *{
    visibility:hidden;
  }
  .preview, .preview *{
    visibility:visible;
  }
  .preview{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    border:none;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Global Legal Affidavit Generator</h2>

<select id="language">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="ur">Urdu</option>
<option value="ar">Arabic</option>
</select>

<select id="country">
<option>India</option>
<option>Pakistan</option>
<option>UAE</option>
<option>Saudi Arabia</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
<option>Australia</option>
<option>Germany</option>
</select>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="father" placeholder="Father / Guardian Name">
<input type="text" id="address" placeholder="Full Address">
<input type="text" id="purpose" placeholder="Affidavit Purpose">
<textarea id="statement" rows="4" placeholder="Write your sworn statement here..."></textarea>

<button onclick="generate()">Update Preview</button>
<button onclick="window.print()">Print A4</button>

<div class="preview" id="previewBox"></div>

</div>

<script>
function generate(){

let lang=document.getElementById("language").value;
let country=document.getElementById("country").value;
let name=document.getElementById("name").value;
let father=document.getElementById("father").value;
let address=document.getElementById("address").value;
let purpose=document.getElementById("purpose").value;
let statement=document.getElementById("statement").value;

let text="";

if(lang==="en"){
text=`
<div dir="ltr">
<div class="legal-header">AFFIDAVIT<div class="sub-head">BEFORE THE NOTARY PUBLIC</div></div>

<div class="legal-body">
<p>I, <b>${name}</b>, son/daughter of <b>${father}</b>, resident of <b>${address}</b>, do hereby solemnly affirm and state as follows:</p>

<ol class="legal-clauses">
<li>That I am the deponent herein.</li>
<li>That this affidavit is made for the purpose of ${purpose}.</li>
<li>${statement}</li>
<li>That the contents of this affidavit are true and correct.</li>
</ol>

<p class="law-line">Verified under the governing law of ${country}.</p>

<div class="date-place">
Place: ____________________<br>
Date: ____________________
</div>

<div class="signature-section">
<div class="sign-box">
_________________________<br>
Signature of Deponent
</div>

<div class="sign-box">
_________________________<br>
Signature & Seal of Notary
</div>
</div>
</div>
</div>
`;
}

if(lang==="hi"){
text=`
<div dir="ltr">
<div class="legal-header">शपथ पत्र<div class="sub-head">नोटरी पब्लिक के समक्ष</div></div>

<div class="legal-body">
<p>मैं, <b>${name}</b>, पिता/अभिभावक <b>${father}</b>, निवासी <b>${address}</b>, शपथपूर्वक यह घोषणा करता/करती हूँ:</p>

<ol class="legal-clauses">
<li>कि मैं इस शपथ पत्र का घोषणाकर्ता हूँ।</li>
<li>कि यह शपथ पत्र ${purpose} के उद्देश्य से बनाया गया है।</li>
<li>${statement}</li>
<li>कि इस शपथ पत्र की सभी बातें सत्य और सही हैं।</li>
</ol>

<p class="law-line">यह घोषणा ${country} के कानून के अंतर्गत सत्यापित है।</p>

<div class="date-place">
स्थान: ____________________<br>
दिनांक: ____________________
</div>

<div class="signature-section">
<div class="sign-box">
_________________________<br>
घोषणाकर्ता के हस्ताक्षर
</div>

<div class="sign-box">
_________________________<br>
नोटरी / प्राधिकारी
</div>
</div>
</div>
</div>
`;
}

if(lang==="ur"){
text=`
<div dir="rtl">
<div class="legal-header">حلف نامہ<div class="sub-head">نوٹری پبلک کے روبرو</div></div>

<div class="legal-body">
<p>میں، <b>${name}</b> ولد/بنت <b>${father}</b>، رہائشی <b>${address}</b>، حلفاً بیان کرتا/کرتی ہوں:</p>

<ol class="legal-clauses">
<li>کہ میں اس حلف نامہ کا بیان کنندہ ہوں۔</li>
<li>کہ یہ حلف نامہ ${purpose} کے مقصد کے لیے تیار کیا گیا ہے۔</li>
<li>${statement}</li>
<li>کہ اس حلف نامہ کے مندرجات درست اور سچ ہیں۔</li>
</ol>

<p class="law-line">یہ بیان ${country} کے قانون کے تحت تصدیق شدہ ہے۔</p>

<div class="date-place">
مقام: ____________________<br>
تاریخ: ____________________
</div>

<div class="signature-section">
<div class="sign-box">
_________________________<br>
دستخط بیان کنندہ
</div>

<div class="sign-box">
_________________________<br>
نوٹری / اتھارٹی
</div>
</div>
</div>
</div>
`;
}

if(lang==="ar"){
text=`
<div dir="rtl">
<div class="legal-header">إقرار قانوني<div class="sub-head">أمام الكاتب بالعدل</div></div>

<div class="legal-body">
<p>أنا، <b>${name}</b> ابن/ابنة <b>${father}</b>، المقيم في <b>${address}</b>، أقر وأصرح بما يلي:</p>

<ol class="legal-clauses">
<li>أنني المقر المذكور أعلاه.</li>
<li>أن هذا الإقرار مقدم لغرض ${purpose}.</li>
<li>${statement}</li>
<li>أن جميع المعلومات صحيحة حسب علمي.</li>
</ol>

<p class="law-line">تم التحقق وفقًا لقانون ${country}.</p>

<div class="date-place">
المكان: ____________________<br>
التاريخ: ____________________
</div>

<div class="signature-section">
<div class="sign-box">
_________________________<br>
توقيع المقر
</div>

<div class="sign-box">
_________________________<br>
توقيع الكاتب بالعدل
</div>
</div>
</div>
</div>
`;
}

document.getElementById("previewBox").innerHTML=text;
}
</script>

</body>
</html>
