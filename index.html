<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Premium Legal Affidavit Generator</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<div class="form-section">
<h2>Global Legal Affidavit Generator</h2>

<label>Language</label>
<select id="lang">
<option value="en">English</option>
<option value="ur">Urdu</option>
<option value="ar">Arabic</option>
<option value="hi">Hindi</option>
<option value="zh">Chinese (Traditional)</option>
</select>

<label>Country (Governing Law)</label>
<input type="text" id="country" placeholder="e.g. India, USA, UAE">

<label>Full Name</label>
<input type="text" id="name">

<label>Father / Parent Name</label>
<input type="text" id="father">

<label>Address</label>
<input type="text" id="address">

<label>Purpose</label>
<textarea id="purpose"></textarea>

<button class="update-btn" onclick="generateAffidavit()">Update Preview</button>
<button class="print-btn" onclick="window.print()">Print A4</button>

</div>

<div class="preview-section">
<div id="preview" class="document-preview">
<!-- Document will generate here -->
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
