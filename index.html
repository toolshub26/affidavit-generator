<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Legal Affidavit Generator</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-container">

<div class="form-section">
<h2>International Legal Affidavit Generator</h2>

<label>Language</label>
<select id="lang">
<option value="en">English</option>
<option value="ar">Arabic</option>
</select>

<label>Country (Governing Law)</label>
<select id="country">
<option value="India">India</option>
<option value="UAE">UAE</option>
<option value="USA">USA</option>
</select>

<label>Full Name</label>
<input type="text" id="name">

<label>Father Name</label>
<input type="text" id="father">

<label>Address</label>
<input type="text" id="address">

<label>Purpose</label>
<textarea id="purpose"></textarea>

<div class="btn-row">
<button onclick="generateAffidavit()">Update Preview</button>
<button onclick="window.print()">Print A4</button>
</div>

</div>

<div id="preview" class="preview-section"></div>

</div>

<script src="script.js"></script>
</body>
</html>
