<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Legal Affidavit Generator</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-container">

<div class="form-section">
<h2>Global Legal Affidavit Generator</h2>

<label>Language</label>
<select id="lang">
<option value="en">English</option>
<option value="ar">Arabic</option>
<option value="ur">Urdu</option>
</select>

<label>Country (Governing Law)</label>
<input list="countries" id="country" placeholder="Type country name...">

<datalist id="countries">
<option value="India">
<option value="Pakistan">
<option value="UAE">
<option value="Saudi Arabia">
<option value="USA">
<option value="UK">
<option value="Canada">
<option value="Australia">
<option value="Germany">
<option value="France">
<option value="China">
<option value="Japan">
<option value="South Africa">
<option value="Malaysia">
<option value="Turkey">
<option value="Qatar">
<option value="Kuwait">
<option value="Oman">
<option value="Indonesia">
<option value="Bangladesh">
</datalist>

<label>Full Name</label>
<input type="text" id="name">

<label>Father Name</label>
<input type="text" id="father">

<label>Address</label>
<input type="text" id="address">

<label>Purpose</label>
<textarea id="purpose"></textarea>

<div class="btn-row">
<button onclick="generateAffidavit()">Update Preview</button>
<button onclick="window.print()">Print A4</button>
</div>

</div>

<div id="preview" class="preview-section"></div>

</div>

<script src="script.js"></script>

</body>
</html>
